<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Inteligente</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<div class="form-container">
  <form id="cadastroForm" novalidate>

    <div class="form-group">
      <label for="nome">Nome Completo *</label>
      <input type="text" id="nome" name="nome" required minlength="3" autocomplete="name">
      <span class="error-msg" id="nome-error"></span>
    </div>

    <div class="form-group">
      <label for="email">E-mail *</label>
      <input type="email" id="email" name="email" required>
      <span class="error-msg" id="email-error"></span>
    </div>

    <div class="form-group">
      <label for="senha">Senha *</label>
      <input type="password" id="senha" name="senha" required minlength="8">
      <div class="strength-bar">
        <div id="strength"></div>
      </div>
      <span class="error-msg" id="senha-error"></span>
    </div>

    <div class="form-group">
      <label for="confirmar">Confirmar Senha *</label>
      <input type="password" id="confirmar" name="confirmar" required>
      <span class="error-msg" id="confirmar-error"></span>
    </div>

    <button type="submit" id="btnSubmit">Criar Conta</button>

    <div id="sucesso"></div>

  </form>
</div>

<script src="js/validação.js"></script>
</body>
</html>
